version: '3.8'

services:
  # ── Frontend React (Nginx) ─────────────────────────────
  web:
    build: .
    container_name: inventario-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    # El backend ahora corre de forma independiente
    # Si quieres que hablen en Docker, deberías ponerlos en la misma red
    # o usar la IP externa del servidor para las llamadas API