version: '3.8'

services:
  # ── Backend API ──────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: invenpro-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: 192.168.100.100
      DB_PORT: 5432
      DB_NAME: papeleriadb
      DB_USER: postgres
      DB_PASSWORD: "123456"
      PORT: 3001
    volumes:
      - ./backend/asset:/app/asset   # Imágenes de productos persistentes
    networks:
      - invenpro-net

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build: .
    container_name: invenpro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - invenpro-net

networks:
  invenpro-net:
    driver: bridge